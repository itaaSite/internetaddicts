# Сборка при публикации GitHub Release: артефакт dist + zip во вложениях релиза.
# Скачать: Releases → нужный тег → astro-dist-<tag>.zip, либо Actions → Artifacts.
name: Release build

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          # Keystatic Cloud / прод-сборка: при ошибках билда добавьте в
          # Settings → Secrets and variables → Actions (имена по доке Keystatic).
          KEYSTATIC_GITHUB_CLIENT_ID: ${{ secrets.KEYSTATIC_GITHUB_CLIENT_ID }}
          KEYSTATIC_GITHUB_CLIENT_SECRET: ${{ secrets.KEYSTATIC_GITHUB_CLIENT_SECRET }}
          KEYSTATIC_SECRET: ${{ secrets.KEYSTATIC_SECRET }}
          PUBLIC_KEYSTATIC_GITHUB_APP_SLUG: ${{ secrets.PUBLIC_KEYSTATIC_GITHUB_APP_SLUG }}

      - name: Verify dist
        run: |
          test -d dist
          n="$(find dist -type f | wc -l)"
          echo "files in dist: $n"
          test "$n" -gt 0

      - name: Zip dist (Release asset)
        run: (cd dist && zip -r "../astro-dist-${{ github.event.release.tag_name }}.zip" .)

      - name: Attach zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: astro-dist-${{ github.event.release.tag_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload dist (Actions artifact)
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.event.release.tag_name }}
          path: dist/
          if-no-files-found: error
